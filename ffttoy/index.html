  let a = 2*map((ang),0,360,0,PI);
  let b = map((ang),0,360,0,TWO_PI);
  for(let i = 1; i <= bins; i++) { //maxbins
    let len = 40*sin(i*a);
    fill(0,150,175);
    rect(floor(windowWidth/bins*(i-1))+12, 43, 15, len);

    strokeWeight(1);
    stroke(200);
    ellipse(floor(windowWidth/bins*(i-1))+20, 100, 18);
    let x = 9*cos((i*b)+radians(phase));

    line(floor(windowWidth/bins*(i-1))+20,100,floor(windowWidth/bins*(i-1))+20+x,100+y);
    noStroke();
  }//4
}//lasso()

//comp.js
class Complex {
  constructor(a,b) {
    this.re = a;
    this.im = b;
  }//const

  add(c) {
    this.re += c.re;
    this.im += c.im;
  }//add

  mult(c) {
    let re = this.re * c.re - this.im * c.im;
    let im = this.re * c.im + this.im * c.re;
    return new Complex(re, im);
  }//mult
}//comp

//dft.js
function dft(x) {
  const X = [];
  const N = x.length;
  for (let k = 0; k < N; k++) {
    let re = 0;
    let im = 0;
    for (let n = 0; n < N; n++) {
      const phi = (TWO_PI * k * n) / N;
      re += x[n] * cos(phi);
      im -= x[n] * sin(phi);
    }
    re = re / N;
    im = im / N;

    let freq = k;
    let amp = sqrt(re * re + im * im);
    let phase = atan2(im, re);
    X[k] = { re, im, freq, amp, phase };
  }
  return X;
}//dft()

//BIG THANKS to Dan Shiffman @ the Coding Train for the dft JS code
function dftc(va) {
  let XY = [];
  let N = va.length;
  for(let k = 0; k < N; k++) {
    let sum = new Complex(0,0);
    for(let n = 0; n < N; n++) {
      let phi = (TWO_PI * k * n) / N;
      let c = new Complex(cos(phi),-sin(phi));
      sum.add(va[n].mult(c));
    }//4
    sum.re = sum.re / N;
    sum.im = sum.im / N;
    //frequency, amplitude, phase
    let fXY = k;
    let aXY = sqrt(sum.re*sum.re + sum.im*sum.im);
    //let aXY = sum.mag();
    let pXY = atan2(sum.im, sum.re);
    //let pXY = sum.heading();
    XY[k] = {re:sum.re, im:sum.im, fXY, aXY, pXY};
    //XY[k] = {re:sum.x, im:sum.y, fXY, aXY, pXY};
  }//4
  return XY;
}//dtfx()

      stroke(r[i+1],g[i+1],b[i+1]);
      strokeWeight(1);
      if(orbits) ellipse(xpos + segsXz[i]*rad, ypos + segsYz[i]*rad,
        coeffs[i]*rad*2*zoomFactor, coeffs[i]*rad*2*zoomFactor);
        strokeWeight(lt);
        if(vectors) line(xpos + segsXz[i]*rad, ypos + segsYz[i]*rad,
          xpos + segsXz[i+1]*rad, ypos + segsYz[i+1]*rad );
          strokeWeight(ps);
          if(points) point(xpos + segsXz[i+1] * rad, ypos + segsYz[i+1] * rad);
        }//4
        stroke(200,0,0);
        point(xpos+rad, ypos+rad);
      }//fi
      //undo last trn()
      translate(-sidepad,-toppad);
    }//drawdtuff()

//listem.js
function setOscs() {
  if(osc.length != bins) {
    if(osc.length > bins) {
      for(let i = osc.length-1; i >= bins; i--) {
        osc[i].stop();
        osc.splice(i,1);
      }//4l
    }//fi
    if(osc.length < bins) {
      for(let i = osc.length; i < bins; i++) {
        osc[i] = new p5.SinOsc();
        //if(listening === true) osc[i].start();
        //if(listening === false) osc[i].stop();
      }//4
    }//fi
  }//fi
}//list()

//udo
function updateOscs() {
  if(listening === true && osc.length === bins)  {
    for(let i = 1; i <= bins; i++) {
      let v = map((vol.value()*shape[i-1]),0.0,1.0,0.0,1.0);
      //if(rbv === 'Square') v = shape;
      let m = 0.2;//soften/headphove speaker caution !
      if(rbv === 'Triangle') m = 0.25;
      if(rbv === 'Pulse') m = 0.05;
      if(rbv === 'Custom') v = map((vol.value()*s5[i-1].value()),0.0,1.0,0.0,1.0);
      osc[i-1].amp(v*m);//.mult([i-1](vol.value());//scale();

      //400hz * 50bins = 20KHz
      osc[i-1].freq((basefreq.value()*i));

      let gp = map(phase,0,360,0,1);
      let phs = map(phases[i-1].value(),0,360,0,1);
      let ph = map(phs+gp,0,2,0,1);
      //let ph = map((phs+gp),0,1,0,1);
      osc[i-1].phase(ph);
    }//4
  }//fi
}//pd()

function ssOscs() {
  if(osc.length === bins) {
    for(let i = 0; i < osc.length; i++) {
      if(listening === true) osc[i].start();
      if(listening === false) osc[i].stop();
    }//4
  }//fi
}//ss()

  for(let i = 0; i <= bins; i++) {

      s5[i].value(coeffs[i+1]);
    }//fi
  }//4

  for(let i = 1; i <= bins+1; i++) {

  //lissajous coords...path/trace

 time -= frequency;//trace

 if(!absolute) x += .872664625; //makes speed of 1 "perfect" display ratio ?
 if(absolute) x += frequency;

      apx.shift();
      apy.shift();
    }///

//sums.js
//sigma
function sumMaxRadius(arr) {
  let sum = 0;
  for (let i = 0; i < arr.length; i++) {
    sum += arr[i];
  }//4
  return (sum);
}//sum

function sumCz(ang) {
  let sum = 1;
  for (let i = 1; i <= bins; i++) {
    if(i < zoomRange + 1) {
      sum += 0;
    } else {
      sum += coeffs[i-1] * cos(i*ang + radians(phase) + radians(phases[i-1].value())) * zoomFactor;
    }//els
    segsXz[i] = (sum);
  }//4
}//sum

function sumSz(ang) {
  let sum = 1;
  for (let i = 1; i <= bins; i++) {
    if(i < zoomRange + 1) {
      sum += 0;
    } else {
      sum += coeffs[i-1] * sin(i*ang + radians(phase) + radians(phases[i-1].value())) * zoomFactor;
    }//els
    segsYz[i] = (sum);
  }//4
}//sum

//the guts a simple math notation Sigma/summation
function sumC(ang) {
  segsX = [];
  segsX[0] = 0;
  let sum = 0;
  for (let i = 0; i <= bins; i++) {
    sum += coeffs[i] * radius * cos(i*ang + radians(phase) + radians(phases[i].value()));
    segsX[i+1] = (sum);
  }//4
  return (sum);
}//sum

function sumS(ang) {
  segsY = [];
  segsY[0] = 0;
  let sum = 0;
  for (let i = 0; i <= bins; i++) {
    sum += coeffs[i] * radius * sin(i*ang + radians(phase) + radians(phases[i].value()));
    segsY[i+1] = (sum);
  }//4
  return (sum);
}//sum
